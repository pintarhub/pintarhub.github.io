<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PintarHub - Whack a Number</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
    </script>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    :root {
        --bg-base: #f8fafc;
        --grad-1: hsla(217,100%,94%,0.5);
        --grad-2: hsla(280,100%,96%,0.5);
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(255, 255, 255, 0.8);
    }
    .dark {
        --bg-base: #020617;
        --grad-1: hsla(217,100%,15%,0.5);
        --grad-2: hsla(280,100%,15%,0.5);
        --glass-bg: rgba(15, 23, 42, 0.6);
        --glass-border: rgba(255, 255, 255, 0.1);
    }
    body { 
        font-family: 'Inter', sans-serif; 
        background-color: var(--bg-base);
        background-image: radial-gradient(at 0% 0%, var(--grad-1) 0, transparent 50%), radial-gradient(at 100% 100%, var(--grad-2) 0, transparent 50%); 
        background-attachment: fixed; 
    }
    .glass-panel { background: var(--glass-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--glass-border); box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05); }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
    .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="flex flex-col min-h-screen text-slate-800 dark:text-slate-100 transition-colors duration-300">

<header class="sticky top-0 z-40 pt-6 px-4 sm:px-8">
    <div class="glass-panel rounded-[2rem] px-6 py-4 flex items-center justify-between max-w-7xl mx-auto shadow-sm">
        <div class="flex items-center gap-3">
            <a href="/pages/games.html" class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center font-bold text-slate-600 dark:text-slate-300 hover:scale-105 transition-all">←</a>
            <div>
                <h1 class="text-xl font-black tracking-tight text-slate-800 dark:text-white">Whack-a-Number</h1>
                <p class="text-xs font-bold text-red-500">Impulse Control Test</p>
            </div>
        </div>
        <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-full bg-white/80 dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700 shadow-sm flex items-center justify-center text-slate-600 dark:text-slate-300">🌙</button>
    </div>
</header>

<main class="flex-1 w-full max-w-2xl mx-auto px-4 py-10 flex flex-col items-center justify-center">
    <div class="glass-panel w-full rounded-[3rem] p-8 sm:p-10 text-center relative overflow-hidden shadow-2xl flex flex-col items-center min-h-[460px] justify-between">
        
        <!-- Game Header Stats -->
        <div class="w-full flex justify-between items-center text-sm font-black text-slate-400 border-b border-slate-200/50 dark:border-slate-700/50 pb-4">
            <span>WAKTU: <span id="time-left" class="text-red-500">30</span>s</span>
            <span>SKOR: <span id="score" class="text-emerald-500">0</span></span>
        </div>

        <!-- Start Screen -->
        <div id="screen-start" class="flex flex-col items-center gap-6 my-auto animate-pop-in">
            <div class="w-20 h-20 rounded-3xl bg-red-500/10 text-red-500 flex items-center justify-center text-4xl shadow-inner">🎯</div>
            <div>
                <h2 class="text-2xl sm:text-3xl font-black text-slate-800 dark:text-white mb-2">Kontrol Impulsmus!</h2>
                <p class="text-sm text-slate-500 dark:text-slate-400 max-w-sm">Klik target angka yang muncul! Tapi **JANGAN KLIK** angka yang merupakan **kelipatan 3** (3, 6, 9, 12, dst).</p>
            </div>
            <button onclick="startGame()" class="px-8 py-4 rounded-2xl bg-red-500 hover:bg-red-600 text-white font-black text-lg shadow-lg shadow-red-500/30 transition-all hover:scale-105 active:scale-95">Mulai Main</button>
        </div>

        <!-- Gameplay Grid Area -->
        <div id="screen-play" class="hidden grid-cols-3 gap-4 w-full max-w-md my-auto animate-pop-in">
            <!-- Grid 9 Kotak -->
            <script>
                for(let i=0; i<9; i++) {
                    document.write(`
                        <button id="cell-${i}" onclick="hitCell(${i})" class="h-24 sm:h-28 rounded-3xl bg-white/60 dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700 shadow-sm flex items-center justify-center text-3xl font-black transition-all active:scale-95 text-slate-800 dark:text-white">
                        </button>
                    `);
                }
            </script>
        </div>

        <!-- Result Screen -->
        <div id="screen-result" class="hidden flex-col items-center gap-6 my-auto animate-pop-in">
            <div id="result-icon" class="text-6xl">🏆</div>
            <div>
                <h3 class="text-2xl font-black text-slate-800 dark:text-white mb-1">Game Selesai!</h3>
                <p class="text-sm text-slate-500 dark:text-slate-400">Total Skor Akhir Kamu:</p>
                <p id="final-score" class="text-5xl font-black text-emerald-500 mt-2">0</p>
            </div>
            <button onclick="startGame()" class="w-full py-4 rounded-2xl bg-red-500 hover:bg-red-600 text-white font-black shadow-lg transition-all hover:scale-105">Coba Lagi</button>
        </div>

    </div>
</main>

<script>
let score = 0;
let timeLeft = 30;
let gameInterval, timerInterval;
let activeIndex = -1;
let activeNumber = 0;

function showScreen(id) {
    ['screen-start', 'screen-play', 'screen-result'].forEach(s => {
        const el = document.getElementById(s);
        if(s === id) { 
            el.classList.remove('hidden'); 
            if(s === 'screen-play') el.classList.add('grid');
            else el.classList.add('flex');
        } else {
            el.classList.add('hidden');
            el.classList.remove('grid', 'flex');
        }
    });
}

function startGame() {
    score = 0;
    timeLeft = 30;
    document.getElementById('score').innerText = score;
    document.getElementById('time-left').innerText = timeLeft;
    showScreen('screen-play');
    
    spawnNumber();
    
    gameInterval = setInterval(spawnNumber, 900); // Angka berpindah tiap 0.9 detik
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('time-left').innerText = timeLeft;
        if(timeLeft <= 0) endGame();
    }, 1000);
}

function spawnNumber() {
    // Reset sel sebelumnya
    if(activeIndex !== -1) {
        const prevCell = document.getElementById(`cell-${activeIndex}`);
        prevCell.innerText = '';
        prevCell.className = "h-24 sm:h-28 rounded-3xl bg-white/60 dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700 shadow-sm flex items-center justify-center text-3xl font-black transition-all active:scale-95 text-slate-800 dark:text-white";
    }

    // Pilih lokasi baru & acak angka (1-30)
    activeIndex = Math.floor(Math.random() * 9);
    activeNumber = Math.floor(Math.random() * 30) + 1;
    
    const currCell = document.getElementById(`cell-${activeIndex}`);
    currCell.innerText = activeNumber;
    currCell.classList.add('bg-amber-100', 'dark:bg-amber-500/20', 'border-amber-400');
}

function hitCell(index) {
    if(index !== activeIndex || activeNumber === 0) return;
    
    const isMultipleOfThree = (activeNumber % 3 === 0);
    const cell = document.getElementById(`cell-${index}`);
    
    if(isMultipleOfThree) {
        // Hukuman jika nge-klik kelipatan 3!
        score = Math.max(0, score - 15);
        cell.classList.add('bg-red-500', 'text-white');
    } else {
        // Jawaban benar
        score += 10;
        cell.classList.add('bg-emerald-500', 'text-white');
    }
    
    document.getElementById('score').innerText = score;
    activeNumber = 0; // Mencegah spam-click
}

function endGame() {
    clearInterval(gameInterval);
    clearInterval(timerInterval);
    document.getElementById('final-score').innerText = score;
    showScreen('screen-result');
}
</script>
</body>
</html>
