<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PintarHub - Memory Maze Navigation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
    </script>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    :root {
        --bg-base: #f8fafc;
        --grad-1: hsla(217,100%,94%,0.5);
        --grad-2: hsla(280,100%,96%,0.5);
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(255, 255, 255, 0.8);
    }
    .dark {
        --bg-base: #020617;
        --grad-1: hsla(217,100%,15%,0.5);
        --grad-2: hsla(280,100%,15%,0.5);
        --glass-bg: rgba(15, 23, 42, 0.6);
        --glass-border: rgba(255, 255, 255, 0.1);
    }
    body { 
        font-family: 'Inter', sans-serif; 
        background-color: var(--bg-base);
        background-image: radial-gradient(at 0% 0%, var(--grad-1) 0, transparent 50%), radial-gradient(at 100% 100%, var(--grad-2) 0, transparent 50%); 
        background-attachment: fixed; 
    }
    .glass-panel { background: var(--glass-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--glass-border); box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05); }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
    .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="flex flex-col min-h-screen text-slate-800 dark:text-slate-100 transition-colors duration-300">

<header class="sticky top-0 z-40 pt-6 px-4 sm:px-8">
    <div class="glass-panel rounded-[2rem] px-6 py-4 flex items-center justify-between max-w-7xl mx-auto shadow-sm">
        <div class="flex items-center gap-3">
            <a href="/pages/games.html" class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center font-bold text-slate-600 dark:text-slate-300 hover:scale-105 transition-all">←</a>
            <div>
                <h1 class="text-xl font-black tracking-tight text-slate-800 dark:text-white">Memory Maze</h1>
                <p class="text-xs font-bold text-violet-500">Spatial Problem Solving</p>
            </div>
        </div>
        <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-full bg-white/80 dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700 shadow-sm flex items-center justify-center text-slate-600 dark:text-slate-300">🌙</button>
    </div>
</header>

<main class="flex-1 w-full max-w-2xl mx-auto px-4 py-10 flex flex-col items-center justify-center">
    <div class="glass-panel w-full rounded-[3rem] p-6 sm:p-10 text-center relative overflow-hidden shadow-2xl flex flex-col items-center min-h-[480px] justify-between">
        
        <!-- Header Status -->
        <div class="w-full flex justify-between items-center text-sm font-black text-slate-400 border-b border-slate-200/50 dark:border-slate-700/50 pb-4">
            <span>LEVEL: <span id="level" class="text-violet-500">1</span></span>
            <span>SKOR: <span id="score" class="text-emerald-500">0</span></span>
        </div>

        <!-- Start Screen -->
        <div id="screen-start" class="flex flex-col items-center gap-6 my-auto animate-pop-in">
            <div class="w-20 h-20 rounded-3xl bg-violet-500/10 text-violet-500 flex items-center justify-center text-4xl shadow-inner">🧩</div>
            <div>
                <h2 class="text-2xl sm:text-3xl font-black text-slate-800 dark:text-white mb-2">Navigasi Jalur Gelap!</h2>
                <p class="text-sm text-slate-500 dark:text-slate-400 max-w-sm">Hafalkan tembok labirin dalam 3 detik sebelum tertutup kabut, lalu bimbing karakter (🔵) menuju pintu keluar (🚩)!</p>
            </div>
            <button onclick="startGame()" class="px-8 py-4 rounded-2xl bg-violet-600 hover:bg-violet-700 text-white font-black text-lg shadow-lg shadow-violet-500/30 transition-all hover:scale-105 active:scale-95">Mulai Main</button>
        </div>

        <!-- Gameplay Screen -->
        <div id="screen-play" class="hidden flex-col items-center gap-5 w-full my-auto animate-pop-in">
            <p id="status-text" class="text-xs font-bold text-amber-500 uppercase tracking-widest animate-pulse">HAFALKAN TEMBOK LABIRIN (3s)...</p>

            <!-- Grid 5x5 Labirin -->
            <div id="maze-grid" class="grid grid-cols-5 gap-2 w-full max-w-[280px] sm:max-w-[320px] p-3 rounded-3xl bg-slate-200/60 dark:bg-slate-900/60 border border-slate-300 dark:border-slate-800 shadow-inner">
            </div>

            <!-- On-Screen D-Pad Controls -->
            <div class="grid grid-cols-3 gap-2 w-full max-w-[180px]">
                <div></div>
                <button onclick="movePlayer(0, -1)" class="h-12 rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 font-black text-xl shadow-md active:scale-95">▲</button>
                <div></div>
                <button onclick="movePlayer(-1, 0)" class="h-12 rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 font-black text-xl shadow-md active:scale-95">◀</button>
                <button onclick="movePlayer(0, 1)" class="h-12 rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 font-black text-xl shadow-md active:scale-95">▼</button>
                <button onclick="movePlayer(1, 0)" class="h-12 rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 font-black text-xl shadow-md active:scale-95">▶</button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="screen-result" class="hidden flex-col items-center gap-6 my-auto animate-pop-in">
            <div id="result-icon" class="text-6xl">🚩</div>
            <div>
                <h3 id="result-title" class="text-2xl font-black text-slate-800 dark:text-white mb-1">Berhasil Menembus Kabut!</h3>
                <p class="text-sm text-slate-500 dark:text-slate-400">Total Skor Akhir Kamu:</p>
                <p id="final-score" class="text-5xl font-black text-violet-500 mt-2">0</p>
            </div>
            <button onclick="startGame()" class="w-full py-4 rounded-2xl bg-violet-600 hover:bg-violet-700 text-white font-black shadow-lg transition-all hover:scale-105">Coba Lagi</button>
        </div>

    </div>
</main>

<script>
const GRID_SIZE = 5;
let level = 1;
let score = 0;
let playerPos = { x: 0, y: 0 };
let goalPos = { x: 4, y: 4 };
let walls = [];
let isFogActive = false;
let canMove = false;

function showScreen(id) {
    ['screen-start', 'screen-play', 'screen-result'].forEach(s => {
        const el = document.getElementById(s);
        if(s === id) { el.classList.remove('hidden'); el.classList.add('flex'); }
        else { el.classList.add('hidden'); el.classList.remove('flex'); }
    });
}

function startGame() {
    level = 1;
    score = 0;
    document.getElementById('level').innerText = level;
    document.getElementById('score').innerText = score;
    showScreen('screen-play');
    
    startRound();
}

function startRound() {
    canMove = false;
    isFogActive = false;
    playerPos = { x: 0, y: 0 };
    goalPos = { x: 4, y: 4 };
    
    // Generate Walls acak
    walls = [];
    const wallCount = Math.min(4 + level, 10);
    while(walls.length < wallCount) {
        let wx = Math.floor(Math.random() * GRID_SIZE);
        let wy = Math.floor(Math.random() * GRID_SIZE);
        // Jangan taruh tembok di posisi start atau goal
        if ((wx === 0 && wy === 0) || (wx === 4 && wy === 4)) continue;
        if (!walls.some(w => w.x === wx && w.y === wy)) {
            walls.push({ x: wx, y: wy });
        }
    }

    renderGrid();

    document.getElementById('status-text').innerText = "HAFALKAN TEMBOK LABIRIN (3s)...";
    document.getElementById('status-text').className = "text-xs font-bold text-amber-500 uppercase tracking-widest animate-pulse";

    // Setelah 3 detik, aktifkan kabut
    setTimeout(() => {
        isFogActive = true;
        canMove = true;
        renderGrid();
        document.getElementById('status-text').innerText = "KABUT AKTIF! JALANKAN KARAKTER";
        document.getElementById('status-text').className = "text-xs font-bold text-violet-500 uppercase tracking-widest";
    }, 3000);
}

function renderGrid() {
    const gridEl = document.getElementById('maze-grid');
    gridEl.innerHTML = '';

    for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
            const cell = document.createElement('div');
            cell.className = "h-12 rounded-xl flex items-center justify-center font-black text-xl transition-all border border-slate-300/30 dark:border-slate-700/30 ";

            const isPlayer = (x === playerPos.x && y === playerPos.y);
            const isGoal = (x === goalPos.x && y === goalPos.y);
            const isWall = walls.some(w => w.x === x && w.y === y);

            if (isPlayer) {
                cell.innerText = '🔵';
                cell.classList.add('bg-blue-500/20', 'border-blue-500');
            } else if (isGoal) {
                cell.innerText = '🚩';
                cell.classList.add('bg-emerald-500/20', 'border-emerald-500');
            } else if (isWall) {
                if (isFogActive) {
                    // Tembok tersembunyi di dalam kabut
                    cell.innerText = '';
                    cell.classList.add('bg-white/40', 'dark:bg-slate-800/40');
                } else {
                    // Tembok terlihat saat fase hafalan
                    cell.innerText = '🧱';
                    cell.classList.add('bg-red-500/20', 'border-red-500');
                }
            } else {
                cell.classList.add('bg-white/40', 'dark:bg-slate-800/40');
            }

            gridEl.appendChild(cell);
        }
    }
}

function movePlayer(dx, dy) {
    if (!canMove) return;

    const newX = playerPos.x + dx;
    const newY = playerPos.y + dy;

    // Cek Out of Bounds
    if (newX < 0 || newX >= GRID_SIZE || newY < 0 || newY >= GRID_SIZE) return;

    // Cek Tabrak Tembok
    const hitWall = walls.some(w => w.x === newX && w.y === newY);
    if (hitWall) {
        // Tabrak Tembok! Game Over
        canMove = false;
        document.getElementById('result-icon').innerText = '💥';
        document.getElementById('result-title').innerText = 'Menabrak Tembok Labirin!';
        document.getElementById('final-score').innerText = score;
        showScreen('screen-result');
        return;
    }

    playerPos.x = newX;
    playerPos.y = newY;
    renderGrid();

    // Cek Sampai Goal
    if (playerPos.x === goalPos.x && playerPos.y === goalPos.y) {
        score += level * 15;
        level++;
        document.getElementById('score').innerText = score;
        document.getElementById('level').innerText = level;
        canMove = false;

        setTimeout(startRound, 600);
    }
}

// Support Kontrol Keyboard Panah
window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp') movePlayer(0, -1);
    if (e.key === 'ArrowDown') movePlayer(0, 1);
    if (e.key === 'ArrowLeft') movePlayer(-1, 0);
    if (e.key === 'ArrowRight') movePlayer(1, 0);
});
</script>
</body>
</html>
