<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PintarHub - Card Rotation Match</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
    </script>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    :root {
        --bg-base: #f8fafc;
        --grad-1: hsla(217,100%,94%,0.5);
        --grad-2: hsla(280,100%,96%,0.5);
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(255, 255, 255, 0.8);
    }
    .dark {
        --bg-base: #020617;
        --grad-1: hsla(217,100%,15%,0.5);
        --grad-2: hsla(280,100%,15%,0.5);
        --glass-bg: rgba(15, 23, 42, 0.6);
        --glass-border: rgba(255, 255, 255, 0.1);
    }
    body { 
        font-family: 'Inter', sans-serif; 
        background-color: var(--bg-base);
        background-image: radial-gradient(at 0% 0%, var(--grad-1) 0, transparent 50%), radial-gradient(at 100% 100%, var(--grad-2) 0, transparent 50%); 
        background-attachment: fixed; 
    }
    .glass-panel { background: var(--glass-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--glass-border); box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05); }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
    .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="flex flex-col min-h-screen text-slate-800 dark:text-slate-100 transition-colors duration-300">

<header class="sticky top-0 z-40 pt-6 px-4 sm:px-8">
    <div class="glass-panel rounded-[2rem] px-6 py-4 flex items-center justify-between max-w-7xl mx-auto shadow-sm">
        <div class="flex items-center gap-3">
            <a href="/pages/games.html" class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center font-bold text-slate-600 dark:text-slate-300 hover:scale-105 transition-all">←</a>
            <div>
                <h1 class="text-xl font-black tracking-tight text-slate-800 dark:text-white">Card Rotation</h1>
                <p class="text-xs font-bold text-teal-500">Updating Spatial Memory Test</p>
            </div>
        </div>
        <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-full bg-white/80 dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700 shadow-sm flex items-center justify-center text-slate-600 dark:text-slate-300">🌙</button>
    </div>
</header>

<main class="flex-1 w-full max-w-2xl mx-auto px-4 py-10 flex flex-col items-center justify-center">
    <div class="glass-panel w-full rounded-[3rem] p-6 sm:p-10 text-center relative overflow-hidden shadow-2xl flex flex-col items-center min-h-[480px] justify-between">
        
        <div class="w-full flex justify-between items-center text-sm font-black text-slate-400 border-b border-slate-200/50 dark:border-slate-700/50 pb-4">
            <span>PERCOBAAN: <span id="tries" class="text-teal-500">0</span></span>
            <span>PASANGAN: <span id="matched" class="text-emerald-500">0/4</span></span>
        </div>

        <div id="screen-start" class="flex flex-col items-center gap-6 my-auto animate-pop-in">
            <div class="w-20 h-20 rounded-3xl bg-teal-500/10 text-teal-500 flex items-center justify-center text-4xl shadow-inner">🃏</div>
            <div>
                <h2 class="text-2xl sm:text-3xl font-black text-slate-800 dark:text-white mb-2">Papan Muter Tiap Salah!</h2>
                <p class="text-sm text-slate-500 dark:text-slate-400 max-w-sm">Cari pasangan kartu yang cocok. Kalau tebakanmu salah, papan grid akan **DIPUTAR 90°**!</p>
            </div>
            <button onclick="startGame()" class="px-8 py-4 rounded-2xl bg-teal-500 hover:bg-teal-600 text-white font-black text-lg shadow-lg shadow-teal-500/30 transition-all hover:scale-105 active:scale-95">Mulai Main</button>
        </div>

        <div id="screen-play" class="hidden flex-col items-center gap-4 w-full my-auto animate-pop-in">
            <p id="status-text" class="text-xs font-bold text-teal-500 uppercase tracking-widest">PILIH 2 KARTU</p>

            <!-- Card Grid 4x2 (8 Cards) Container with Smooth Rotation -->
            <div id="grid-container" class="grid grid-cols-4 gap-3 p-3 rounded-3xl bg-slate-200/60 dark:bg-slate-900/60 border border-slate-300 dark:border-slate-800 shadow-inner transition-transform duration-700 w-full max-w-xs">
            </div>
        </div>

        <div id="screen-result" class="hidden flex-col items-center gap-6 my-auto animate-pop-in">
            <div class="text-6xl">🎉</div>
            <div>
                <h3 class="text-2xl font-black text-slate-800 dark:text-white mb-1">Berhasil Selesai!</h3>
                <p class="text-sm text-slate-500 dark:text-slate-400">Total Percobaan Kamu:</p>
                <p id="final-tries" class="text-5xl font-black text-teal-500 mt-2">0</p>
            </div>
            <button onclick="startGame()" class="w-full py-4 rounded-2xl bg-teal-500 hover:bg-teal-600 text-white font-black shadow-lg transition-all hover:scale-105">Coba Lagi</button>
        </div>

    </div>
</main>

<script>
const ICONS = ['🚀', '🚀', '🔮', '🔮', '💎', '💎', '🦊', '🦊'];

let cards = [];
let flippedCards = [];
let matchedCount = 0;
let tries = 0;
let currentRotation = 0;
let isLock = false;

function showScreen(id) {
    ['screen-start', 'screen-play', 'screen-result'].forEach(s => {
        const el = document.getElementById(s);
        if(s === id) { el.classList.remove('hidden'); el.classList.add('flex'); }
        else { el.classList.add('hidden'); el.classList.remove('flex'); }
    });
}

function startGame() {
    matchedCount = 0;
    tries = 0;
    currentRotation = 0;
    flippedCards = [];
    isLock = false;

    document.getElementById('tries').innerText = tries;
    document.getElementById('matched').innerText = `0/4`;
    document.getElementById('grid-container').style.transform = `rotate(0deg)`;

    // Shuffle Cards
    cards = ICONS.map((icon, idx) => ({ id: idx, icon: icon, isFlipped: false, isMatched: false }))
                 .sort(() => 0.5 - Math.random());

    showScreen('screen-play');
    renderCards();
}

function renderCards() {
    const container = document.getElementById('grid-container');
    container.innerHTML = '';

    cards.forEach((card, idx) => {
        const btn = document.createElement('button');
        btn.onclick = () => cardClicked(idx);
        btn.className = "h-20 rounded-2xl border flex items-center justify-center text-2xl font-black transition-all active:scale-95 shadow-sm " +
            (card.isFlipped || card.isMatched 
                ? "bg-white dark:bg-slate-800 border-teal-400 text-slate-800 dark:text-white" 
                : "bg-teal-500 border-teal-400 text-transparent");

        btn.innerText = (card.isFlipped || card.isMatched) ? card.icon : '❓';
        container.appendChild(btn);
    });
}

function cardClicked(idx) {
    if(isLock || cards[idx].isFlipped || cards[idx].isMatched) return;

    cards[idx].isFlipped = true;
    flippedCards.push(idx);
    renderCards();

    if(flippedCards.length === 2) {
        tries++;
        document.getElementById('tries').innerText = tries;
        isLock = true;

        const [idx1, idx2] = flippedCards;

        if(cards[idx1].icon === cards[idx2].icon) {
            // Match!
            cards[idx1].isMatched = true;
            cards[idx2].isMatched = true;
            matchedCount++;
            document.getElementById('matched').innerText = `${matchedCount}/4`;
            flippedCards = [];
            isLock = false;

            if(matchedCount === 4) {
                setTimeout(() => {
                    document.getElementById('final-tries').innerText = tries;
                    showScreen('screen-result');
                }, 500);
            }
        } else {
            // Mis-match! Muter grid 90 derajat
            document.getElementById('status-text').innerText = "SALAH! PAPAN DIPUTAR 90°...";
            document.getElementById('status-text').className = "text-xs font-bold text-rose-500 uppercase tracking-widest animate-pulse";

            currentRotation += 90;
            document.getElementById('grid-container').style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                cards[idx1].isFlipped = false;
                cards[idx2].isFlipped = false;
                flippedCards = [];
                isLock = false;
                document.getElementById('status-text').innerText = "PILIH 2 KARTU";
                document.getElementById('status-text').className = "text-xs font-bold text-teal-500 uppercase tracking-widest";
                renderCards();
            }, 1000);
        }
    }
}
</script>
</body>
</html>
