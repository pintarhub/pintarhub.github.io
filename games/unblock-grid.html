<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PintarHub - Unblock Grid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
    </script>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    :root {
        --bg-base: #f8fafc;
        --grad-1: hsla(217,100%,94%,0.5);
        --grad-2: hsla(280,100%,96%,0.5);
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(255, 255, 255, 0.8);
    }
    .dark {
        --bg-base: #020617;
        --grad-1: hsla(217,100%,15%,0.5);
        --grad-2: hsla(280,100%,15%,0.5);
        --glass-bg: rgba(15, 23, 42, 0.6);
        --glass-border: rgba(255, 255, 255, 0.1);
    }
    body { 
        font-family: 'Inter', sans-serif; 
        background-color: var(--bg-base);
        background-image: radial-gradient(at 0% 0%, var(--grad-1) 0, transparent 50%), radial-gradient(at 100% 100%, var(--grad-2) 0, transparent 50%); 
        background-attachment: fixed; 
    }
    .glass-panel { background: var(--glass-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--glass-border); box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05); }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
    .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="flex flex-col min-h-screen text-slate-800 dark:text-slate-100 transition-colors duration-300">

<header class="sticky top-0 z-40 pt-6 px-4 sm:px-8">
    <div class="glass-panel rounded-[2rem] px-6 py-4 flex items-center justify-between max-w-7xl mx-auto shadow-sm">
        <div class="flex items-center gap-3">
            <a href="/pages/games.html" class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center font-bold text-slate-600 dark:text-slate-300 hover:scale-105 transition-all">←</a>
            <div>
                <h1 class="text-xl font-black tracking-tight text-slate-800 dark:text-white">Unblock Grid</h1>
                <p class="text-xs font-bold text-purple-500">Spatial Strategy Test</p>
            </div>
        </div>
        <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-full bg-white/80 dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700 shadow-sm flex items-center justify-center text-slate-600 dark:text-slate-300">🌙</button>
    </div>
</header>

<main class="flex-1 w-full max-w-2xl mx-auto px-4 py-10 flex flex-col items-center justify-center">
    <div class="glass-panel w-full rounded-[3rem] p-6 sm:p-10 text-center relative overflow-hidden shadow-2xl flex flex-col items-center min-h-[480px] justify-between">
        
        <div class="w-full flex justify-between items-center text-sm font-black text-slate-400 border-b border-slate-200/50 dark:border-slate-700/50 pb-4">
            <span>LEVEL: <span id="level" class="text-purple-500">1</span></span>
            <span>LANGKAH: <span id="moves" class="text-emerald-500">0</span></span>
        </div>

        <div id="screen-start" class="flex flex-col items-center gap-6 my-auto animate-pop-in">
            <div class="w-20 h-20 rounded-3xl bg-purple-500/10 text-purple-500 flex items-center justify-center text-4xl shadow-inner">🧱</div>
            <div>
                <h2 class="text-2xl sm:text-3xl font-black text-slate-800 dark:text-white mb-2">Buka Jalur Keluar!</h2>
                <p class="text-sm text-slate-500 dark:text-slate-400 max-w-sm">Geser balok halangan (🧱) untuk membawa balok target (🔴) keluar ke bendera *finish* (🚩)!</p>
            </div>
            <button onclick="startGame()" class="px-8 py-4 rounded-2xl bg-purple-600 hover:bg-purple-700 text-white font-black text-lg shadow-lg shadow-purple-500/30 transition-all hover:scale-105 active:scale-95">Mulai Main</button>
        </div>

        <div id="screen-play" class="hidden flex-col items-center gap-4 w-full my-auto animate-pop-in">
            <p class="text-xs font-bold text-purple-500 uppercase tracking-widest">GESER BALOK UNTUK MEMBUKA JALAN</p>

            <!-- 4x4 Grid Container -->
            <div id="grid-board" class="grid grid-cols-4 gap-2 p-3 rounded-3xl bg-slate-200/60 dark:bg-slate-900/60 border border-slate-300 dark:border-slate-800 shadow-inner w-64 h-64">
            </div>

            <div class="flex gap-4 mt-2">
                <button onclick="moveRed('left')" class="px-5 py-3 rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 font-black text-lg shadow-sm active:scale-95">◀ Kiri</button>
                <button onclick="moveRed('right')" class="px-5 py-3 rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 font-black text-lg shadow-sm active:scale-95">Kanan ▶</button>
            </div>
        </div>

        <div id="screen-result" class="hidden flex-col items-center gap-6 my-auto animate-pop-in">
            <div class="text-6xl">🚩</div>
            <div>
                <h3 class="text-2xl font-black text-slate-800 dark:text-white mb-1">Strategi Jalur Efisien!</h3>
                <p class="text-sm text-slate-500 dark:text-slate-400">Total Langkah:</p>
                <p id="final-moves" class="text-5xl font-black text-purple-500 mt-2">0</p>
            </div>
            <button onclick="startGame()" class="w-full py-4 rounded-2xl bg-purple-600 hover:bg-purple-700 text-white font-black shadow-lg transition-all hover:scale-105">Coba Lagi</button>
        </div>

    </div>
</main>

<script>
let level = 1;
let moves = 0;
let redPos = 0; // index in 4x4 grid (row 1, col 0)
let exitPos = 3; // index in 4x4 grid (row 1, col 3)
let wallIndices = [];

function showScreen(id) {
    ['screen-start', 'screen-play', 'screen-result'].forEach(s => {
        const el = document.getElementById(s);
        if(s === id) { el.classList.remove('hidden'); el.classList.add('flex'); }
        else { el.classList.add('hidden'); el.classList.remove('flex'); }
    });
}

function startGame() {
    level = 1;
    moves = 0;
    document.getElementById('level').innerText = level;
    document.getElementById('moves').innerText = moves;
    showScreen('screen-play');
    startRound();
}

function startRound() {
    redPos = 1; // row 1, col 1
    exitPos = 3; // row 1, col 3 (Finish)
    
    // Taruh tembok halangan acak
    wallIndices = [2]; // Tembok default di col 2
    if(level > 1) wallIndices.push(6);
    if(level > 2) wallIndices.push(10);

    renderBoard();
}

function renderBoard() {
    const board = document.getElementById('grid-board');
    board.innerHTML = '';

    for(let i=0; i<16; i++) {
        const cell = document.createElement('div');
        cell.className = "rounded-2xl border flex items-center justify-center text-xl font-black transition-all shadow-sm ";

        if(i === redPos) {
            cell.innerText = '🔴';
            cell.classList.add('bg-red-500/20', 'border-red-500');
        } else if(i === exitPos) {
            cell.innerText = '🚩';
            cell.classList.add('bg-emerald-500/20', 'border-emerald-500');
        } else if(wallIndices.includes(i)) {
            cell.innerText = '🧱';
            cell.classList.add('bg-slate-400/30', 'border-slate-500', 'cursor-pointer');
            cell.onclick = () => clearWall(i);
        } else {
            cell.classList.add('bg-white/40', 'dark:bg-slate-800/40', 'border-slate-200/50', 'dark:border-slate-700/50');
        }

        board.appendChild(cell);
    }
}

function clearWall(idx) {
    // Geser/Singkirkan tembok dengan klik
    const pos = wallIndices.indexOf(idx);
    if(pos !== -1) {
        wallIndices.splice(pos, 1);
        moves++;
        document.getElementById('moves').innerText = moves;
        renderBoard();
    }
}

function moveRed(dir) {
    if(dir === 'right') {
        const next = redPos + 1;
        // Cek apakah tidak kena tembok dan tidak lewat baris
        if(!wallIndices.includes(next) && Math.floor(next/4) === Math.floor(redPos/4)) {
            redPos = next;
            moves++;
        }
    } else if(dir === 'left') {
        const prev = redPos - 1;
        if(!wallIndices.includes(prev) && Math.floor(prev/4) === Math.floor(redPos/4)) {
            redPos = prev;
            moves++;
        }
    }

    document.getElementById('moves').innerText = moves;
    renderBoard();

    // Cek Sampai Finish
    if(redPos === exitPos) {
        if(level < 3) {
            level++;
            document.getElementById('level').innerText = level;
            setTimeout(startRound, 400);
        } else {
            setTimeout(() => {
                document.getElementById('final-moves').innerText = moves;
                showScreen('screen-result');
            }, 300);
        }
    }
}
</script>
</body>
</html>
