<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oxford 3000 - PintarHub</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
body { font-family: 'Inter', sans-serif; background: #f8fafc; background-image: radial-gradient(at 0% 0%, hsla(150,100%,94%,0.5) 0, transparent 50%), radial-gradient(at 100% 100%, hsla(200,100%,96%,0.5) 0, transparent 50%); background-attachment: fixed; }
.glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05); }
.hover-lift { transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
.hover-lift:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -10px rgba(59, 130, 246, 0.15); }
@keyframes slideDownHeader { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.header-anim { animation: slideDownHeader 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
.flip-card { perspective: 1000px; }
.flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
.flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
.flip-card-front, .flip-card-back { position: absolute; inset: 0; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 3rem; padding: 2rem; }
.flip-card-front { background: white; border: 2px solid #e2e8f0; }
.flip-card-back { background: #0f172a; color: white; transform: rotateY(180deg); border: 2px solid #1e293b; }
::-webkit-scrollbar { width: 0px; }
</style>
</head>
<body class="flex flex-col min-h-screen text-slate-800">

<header class="sticky top-0 z-40 pt-6 px-4 sm:px-8 header-anim">
    <div class="glass-panel rounded-[2rem] px-6 py-4 flex items-center justify-between max-w-4xl mx-auto shadow-sm">
        <div class="flex items-center gap-3">
            <button onclick="window.location.href='index.html'" class="w-10 h-10 rounded-xl bg-white border border-slate-200 flex items-center justify-center text-slate-600 hover:bg-slate-50 transition-colors shadow-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 class="text-xl font-black tracking-tight text-slate-800">The Oxford 3000</h1>
        </div>
        <span id="card-counter" class="text-sm font-bold text-slate-500 bg-white px-4 py-2 rounded-full border border-slate-200 shadow-sm">0 / 0</span>
    </div>
</header>

<main class="flex-1 w-full max-w-4xl mx-auto px-4 sm:px-6 py-12 flex flex-col items-center justify-center pb-36">
    <div class="text-center mb-8">
        <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Tap kartu untuk melihat arti</p>
    </div>

    <div class="w-full max-w-md h-96 flip-card cursor-pointer group" onclick="toggleFlip()">
        <div id="flashcard-inner" class="flip-card-inner shadow-xl shadow-slate-200/50 group-hover:-translate-y-2 transition-transform duration-300">
            <div class="flip-card-front">
                <h2 id="word-eng" class="text-5xl font-black text-slate-800 tracking-tight mb-2">Memuat...</h2>
            </div>
            <div class="flip-card-back">
                <h2 id="word-id" class="text-3xl sm:text-4xl font-black text-white tracking-tight mb-4 leading-tight">Memuat...</h2>
            </div>
        </div>
    </div>

    <div class="flex gap-6 mt-12 w-full max-w-md">
        <button onclick="prevCard()" class="flex-1 py-4 bg-white border-2 border-slate-200 text-slate-600 rounded-2xl font-black text-lg hover:bg-slate-50 transition-colors shadow-sm active:scale-95">SEBELUMNYA</button>
        <button onclick="nextCard()" class="flex-1 py-4 bg-slate-900 text-white rounded-2xl font-black text-lg hover:bg-slate-800 transition-colors shadow-xl shadow-slate-900/20 active:scale-95">SELANJUTNYA</button>
    </div>
</main>

<script>
let flashcards = [];
let currentIndex = 0;
let isFlipped = false;

async function loadFlashcards() {
    try {
        const response = await fetch('/database/oxford.json');
        if (!response.ok) throw new Error('Gagal');
        flashcards = await response.json();
        renderCard();
    } catch (error) {
        document.getElementById('word-eng').innerText = "Oops!";
        document.getElementById('word-id').innerText = "Data gagal dimuat.";
        if(window.location.protocol === 'file:') {
            alert("Buka file ini menggunakan Live Server di VS Code agar JSON bisa terbaca.");
        }
    }
}

function renderCard() {
    if (flashcards.length === 0) return;
    const card = flashcards[currentIndex];
    document.getElementById('word-eng').innerText = card.en;
    document.getElementById('word-id').innerText = card.id;
    document.getElementById('card-counter').innerText = `${currentIndex + 1} / ${flashcards.length}`;
    
    const cardEl = document.querySelector('.flip-card');
    if(isFlipped) {
        cardEl.classList.remove('flipped');
        isFlipped = false;
    }
}

function toggleFlip() {
    const card = document.querySelector('.flip-card');
    card.classList.toggle('flipped');
    isFlipped = !isFlipped;
}

function nextCard() {
    if(currentIndex < flashcards.length - 1) {
        currentIndex++;
        renderCard();
    }
}

function prevCard() {
    if(currentIndex > 0) {
        currentIndex--;
        renderCard();
    }
}

window.addEventListener('DOMContentLoaded', () => {
    loadFlashcards();
});
</script>
</body>
</html>
