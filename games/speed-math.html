<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PintarHub - Speed Math Rush</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
    </script>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    :root {
        --bg-base: #f8fafc;
        --grad-1: hsla(217,100%,94%,0.5);
        --grad-2: hsla(280,100%,96%,0.5);
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(255, 255, 255, 0.8);
    }
    .dark {
        --bg-base: #020617;
        --grad-1: hsla(217,100%,15%,0.5);
        --grad-2: hsla(280,100%,15%,0.5);
        --glass-bg: rgba(15, 23, 42, 0.6);
        --glass-border: rgba(255, 255, 255, 0.1);
    }
    body { 
        font-family: 'Inter', sans-serif; 
        background-color: var(--bg-base);
        background-image: radial-gradient(at 0% 0%, var(--grad-1) 0, transparent 50%), radial-gradient(at 100% 100%, var(--grad-2) 0, transparent 50%); 
        background-attachment: fixed; 
    }
    .glass-panel { background: var(--glass-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--glass-border); box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05); }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
    .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="flex flex-col min-h-screen text-slate-800 dark:text-slate-100 transition-colors duration-300">

<header class="sticky top-0 z-40 pt-6 px-4 sm:px-8">
    <div class="glass-panel rounded-[2rem] px-6 py-4 flex items-center justify-between max-w-7xl mx-auto shadow-sm">
        <div class="flex items-center gap-3">
            <a href="/pages/games.html" class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center font-bold text-slate-600 dark:text-slate-300 hover:scale-105 transition-all">←</a>
            <div>
                <h1 class="text-xl font-black tracking-tight text-slate-800 dark:text-white">Speed Math</h1>
                <p class="text-xs font-bold text-rose-500">Fluid Intelligence Test</p>
            </div>
        </div>
        <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-full bg-white/80 dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700 shadow-sm flex items-center justify-center text-slate-600 dark:text-slate-300">🌙</button>
    </div>
</header>

<main class="flex-1 w-full max-w-2xl mx-auto px-4 py-10 flex flex-col items-center justify-center">
    <div class="glass-panel w-full rounded-[3rem] p-8 sm:p-12 text-center relative overflow-hidden shadow-2xl flex flex-col items-center min-h-[460px] justify-between">
        
        <!-- Status Header -->
        <div class="w-full flex justify-between items-center text-sm font-black text-slate-400 border-b border-slate-200/50 dark:border-slate-700/50 pb-4">
            <span>COMBO: <span id="combo" class="text-rose-500">0</span>x</span>
            <span>SKOR: <span id="score" class="text-emerald-500">0</span></span>
        </div>

        <!-- Start Screen -->
        <div id="screen-start" class="flex flex-col items-center gap-6 my-auto animate-pop-in">
            <div class="w-20 h-20 rounded-3xl bg-rose-500/10 text-rose-500 flex items-center justify-center text-4xl shadow-inner">💡</div>
            <div>
                <h2 class="text-2xl sm:text-3xl font-black text-slate-800 dark:text-white mb-2">Hitung Cepat Kilat!</h2>
                <p class="text-sm text-slate-500 dark:text-slate-400 max-w-sm">Jawab Benar atau Salah dari persamaan matematika yang muncul dalam waktu kurang dari 3 detik!</p>
            </div>
            <button onclick="startGame()" class="px-8 py-4 rounded-2xl bg-rose-500 hover:bg-rose-600 text-white font-black text-lg shadow-lg shadow-rose-500/30 transition-all hover:scale-105 active:scale-95">Mulai Main</button>
        </div>

        <!-- Gameplay Screen -->
        <div id="screen-play" class="hidden flex-col items-center gap-6 w-full my-auto animate-pop-in">
            <!-- Time Progress Bar -->
            <div class="w-full bg-slate-200 dark:bg-slate-800 h-2.5 rounded-full overflow-hidden max-w-xs">
                <div id="timer-bar" class="bg-rose-500 h-full w-full transition-all linear"></div>
            </div>

            <!-- Math Question -->
            <div id="math-expression" class="text-5xl sm:text-6xl font-black tracking-wider text-slate-900 dark:text-white my-4 font-mono">
                12 + 15 = 27
            </div>

            <!-- True / False Buttons -->
            <div class="grid grid-cols-2 gap-4 w-full max-w-xs">
                <button onclick="checkAnswer(true)" class="py-5 rounded-2xl bg-emerald-500 text-white font-black text-xl shadow-lg hover:scale-105 active:scale-95 transition-all">BENAR (✓)</button>
                <button onclick="checkAnswer(false)" class="py-5 rounded-2xl bg-rose-500 text-white font-black text-xl shadow-lg hover:scale-105 active:scale-95 transition-all">SALAH (✕)</button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="screen-result" class="hidden flex-col items-center gap-6 my-auto animate-pop-in">
            <div id="result-icon" class="text-6xl">🔥</div>
            <div>
                <h3 class="text-2xl font-black text-slate-800 dark:text-white mb-1">Waktu Habis!</h3>
                <p class="text-sm text-slate-500 dark:text-slate-400">Total Skor Akhir Kamu:</p>
                <p id="final-score" class="text-5xl font-black text-rose-500 mt-2">0</p>
            </div>
            <button onclick="startGame()" class="w-full py-4 rounded-2xl bg-rose-500 hover:bg-rose-600 text-white font-black shadow-lg transition-all hover:scale-105">Coba Lagi</button>
        </div>

    </div>
</main>

<script>
let score = 0;
let combo = 0;
let isExpressionTrue = true;
let questionTimer = null;
const QUESTION_TIME = 2500; // 2.5 detik per soal

function showScreen(id) {
    ['screen-start', 'screen-play', 'screen-result'].forEach(s => {
        const el = document.getElementById(s);
        if(s === id) { el.classList.remove('hidden'); el.classList.add('flex'); }
        else { el.classList.add('hidden'); el.classList.remove('flex'); }
    });
}

function startGame() {
    score = 0;
    combo = 0;
    document.getElementById('score').innerText = score;
    document.getElementById('combo').innerText = combo;
    showScreen('screen-play');
    
    generateQuestion();
}

function generateQuestion() {
    clearTimeout(questionTimer);

    const ops = ['+', '-', '×'];
    const op = ops[Math.floor(Math.random() * ops.length)];
    let n1, n2, actualAns;

    if (op === '+') {
        n1 = Math.floor(Math.random() * 40) + 1;
        n2 = Math.floor(Math.random() * 40) + 1;
        actualAns = n1 + n2;
    } else if (op === '-') {
        n1 = Math.floor(Math.random() * 50) + 10;
        n2 = Math.floor(Math.random() * n1);
        actualAns = n1 - n2;
    } else {
        n1 = Math.floor(Math.random() * 12) + 1;
        n2 = Math.floor(Math.random() * 10) + 1;
        actualAns = n1 * n2;
    }

    // Determine 50% chance of being wrong
    isExpressionTrue = Math.random() > 0.5;
    let displayedAns = actualAns;

    if (!isExpressionTrue) {
        const offset = (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random() * 3) + 1);
        displayedAns = Math.max(0, actualAns + offset);
        if(displayedAns === actualAns) displayedAns += 2;
    }

    document.getElementById('math-expression').innerText = `${n1} ${op} ${n2} = ${displayedAns}`;

    // Timer bar animation reset
    const timerBar = document.getElementById('timer-bar');
    timerBar.style.transition = 'none';
    timerBar.style.width = '100%';
    
    setTimeout(() => {
        timerBar.style.transition = `width ${QUESTION_TIME}ms linear`;
        timerBar.style.width = '0%';
    }, 50);

    questionTimer = setTimeout(() => {
        endGame();
    }, QUESTION_TIME);
}

function checkAnswer(userChoice) {
    if (userChoice === isExpressionTrue) {
        combo++;
        score += 10 + (combo * 2);
        document.getElementById('score').innerText = score;
        document.getElementById('combo').innerText = combo;
        generateQuestion();
    } else {
        endGame();
    }
}

function endGame() {
    clearTimeout(questionTimer);
    document.getElementById('final-score').innerText = score;
    showScreen('screen-result');
}
</script>
</body>
</html>
