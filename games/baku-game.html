<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baku & Tidak Baku - PintarHub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
    tailwind.config = { darkMode: 'class' };
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark');
    }
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root {
    --bg-base: #f8fafc;
    --grad-1: hsla(350,100%,94%,0.5);
    --grad-2: hsla(10,100%,96%,0.5);
    --modal-bg: rgba(255, 255, 255, 0.85);
    --modal-border: rgba(255, 255, 255, 1);
}
.dark {
    --bg-base: #020617;
    --grad-1: hsla(350,100%,15%,0.5);
    --grad-2: hsla(10,100%,15%,0.5);
    --modal-bg: rgba(2, 6, 23, 0.85);
    --modal-border: rgba(255, 255, 255, 0.15);
}
body { font-family: 'Inter', sans-serif; background-color: var(--bg-base); background-image: radial-gradient(at 0% 0%, var(--grad-1) 0, transparent 50%), radial-gradient(at 100% 100%, var(--grad-2) 0, transparent 50%); background-attachment: fixed; }
.modal-glass { background: var(--modal-bg); backdrop-filter: blur(30px); border: 1px solid var(--modal-border); box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.5); }
@keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
.animate-pop-in { animation: popIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
::-webkit-scrollbar { width: 0px; }
</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 text-slate-800 dark:text-slate-100 transition-colors duration-300">

<div id="panel-gameplay" class="modal-glass rounded-[3rem] p-8 sm:p-10 w-full max-w-2xl flex flex-col gap-6 animate-pop-in relative overflow-hidden">
    <div class="flex justify-between items-center bg-white/70 dark:bg-slate-800/70 px-6 py-4 rounded-3xl border border-white dark:border-slate-700 shadow-sm transition-colors">
        <div class="flex gap-4">
            <div class="text-green-600 dark:text-green-400 font-bold text-lg">Benar: <span id="score-correct" class="text-2xl font-black ml-1">0</span></div>
            <div class="text-rose-600 dark:text-rose-400 font-bold text-lg">Salah: <span id="score-wrong" class="text-2xl font-black ml-1">0</span></div>
        </div>
        <div class="flex items-center gap-3">
            <div id="timer-container" class="flex items-center gap-2">
                <svg class="w-7 h-7 text-rose-500 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span id="game-timer" class="text-rose-600 dark:text-rose-400 font-black text-3xl tracking-widest">01:00</span>
            </div>
            <button id="btn-end-session" onclick="endGame()" class="hidden bg-slate-900 dark:bg-slate-700 text-white px-6 py-3 rounded-2xl font-bold text-sm hover:bg-slate-800 dark:hover:bg-slate-600 transition-colors shadow-lg active:scale-95">Akhiri Sesi</button>
        </div>
    </div>
    
    <div class="py-12 text-center px-4">
        <p class="text-sm font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-4">Apakah kata ini baku?</p>
        <h1 id="baku-question" class="text-6xl sm:text-7xl font-black text-slate-800 dark:text-white tracking-tighter drop-shadow-sm leading-tight transition-colors">Memuat...</h1>
    </div>

    <div id="answer-options" class="grid grid-cols-2 gap-5">
        <button onclick="checkAnswer(true, this)" class="py-8 rounded-3xl bg-white dark:bg-slate-800 hover:bg-emerald-500 dark:hover:bg-emerald-600 hover:text-white text-slate-800 dark:text-white font-black text-3xl border-2 border-slate-200 dark:border-slate-700 hover:border-emerald-500 shadow-sm transition-all active:scale-95">BAKU</button>
        <button onclick="checkAnswer(false, this)" class="py-8 rounded-3xl bg-white dark:bg-slate-800 hover:bg-rose-500 dark:hover:bg-rose-600 hover:text-white text-slate-800 dark:text-white font-black text-3xl border-2 border-slate-200 dark:border-slate-700 hover:border-rose-500 shadow-sm transition-all active:scale-95">TIDAK BAKU</button>
    </div>

    <div id="explanation-box" class="hidden mt-4 p-8 bg-slate-50 dark:bg-slate-800/80 border-2 border-slate-200 dark:border-slate-700 rounded-3xl animate-pop-in text-center transition-colors">
        <h3 class="font-bold text-slate-500 dark:text-slate-400 mb-2 text-sm uppercase tracking-widest">Bentuk Baku Menurut KBBI:</h3>
        <p id="correct-word-display" class="text-4xl font-black text-slate-800 dark:text-white mb-4"></p>
        <p id="explanation-text" class="text-slate-600 dark:text-slate-300 font-medium text-lg leading-relaxed"></p>
        <button onclick="generateQuestion()" class="mt-8 w-full py-4 bg-slate-900 dark:bg-slate-700 hover:bg-slate-800 dark:hover:bg-slate-600 text-white rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">Lanjut ke Kata Berikutnya</button>
    </div>
</div>

<div id="panel-result" class="modal-glass rounded-[3rem] p-12 w-full max-w-md hidden flex-col items-center gap-8 text-center animate-pop-in">
    <div class="w-28 h-28 bg-gradient-to-br from-rose-400 to-red-500 rounded-full flex items-center justify-center shadow-2xl shadow-red-500/40 text-white mb-2">
        <svg class="w-14 h-14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
    </div>
    <div>
        <h2 id="result-title" class="text-4xl font-black text-slate-800 dark:text-white mb-2 tracking-tight">Sesi Selesai!</h2>
        <p class="text-slate-500 dark:text-slate-400 font-bold text-lg">Berikut adalah hasil belajarmu:</p>
    </div>
    <div class="flex gap-10">
        <div>
            <div class="text-5xl font-black text-green-500" id="final-correct">0</div>
            <div class="text-sm text-slate-400 font-bold uppercase tracking-widest mt-2">Benar</div>
        </div>
        <div>
            <div class="text-5xl font-black text-rose-500" id="final-wrong">0</div>
            <div class="text-sm text-slate-400 font-bold uppercase tracking-widest mt-2">Salah</div>
        </div>
    </div>
    <button onclick="window.location.href='/index.html'" class="w-full mt-4 py-5 rounded-3xl bg-slate-900 dark:bg-slate-700 hover:bg-slate-800 dark:hover:bg-slate-600 text-white font-bold text-xl shadow-xl transition-all hover:-translate-y-1">Kembali ke Dashboard</button>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const mode = urlParams.get('mode') || 'timer';
let bakuData = []; let currentQuestion = null; let correctCount = 0; let wrongCount = 0; let timeLeft = 60; let timerId = null; let isChecking = false;

async function loadBakuData() {
    try {
        const response = await fetch('/database/baku.json');
        if (!response.ok) throw new Error('Gagal memuat bank soal');
        bakuData = await response.json();
        bakuData = bakuData.sort(() => Math.random() - 0.5);
        generateQuestion();
    } catch (error) {
        document.getElementById('baku-question').innerText = "Gagal memuat data.";
    }
}

function updateTimerDisplay() { let m = Math.floor(timeLeft / 60).toString().padStart(2, '0'); let s = (timeLeft % 60).toString().padStart(2, '0'); document.getElementById('game-timer').innerText = `${m}:${s}`; }

function generateQuestion() {
    if (bakuData.length === 0) return;
    isChecking = false; document.getElementById('explanation-box').classList.add('hidden');
    const randomIndex = Math.floor(Math.random() * bakuData.length); currentQuestion = bakuData[randomIndex];
    document.getElementById('baku-question').innerText = currentQuestion.word;
    const btns = document.getElementById('answer-options').querySelectorAll('button');
    btns[0].className = "py-8 rounded-3xl bg-white dark:bg-slate-800 hover:bg-emerald-500 dark:hover:bg-emerald-600 hover:text-white text-slate-800 dark:text-white font-black text-3xl border-2 border-slate-200 dark:border-slate-700 hover:border-emerald-500 shadow-sm transition-all active:scale-95";
    btns[1].className = "py-8 rounded-3xl bg-white dark:bg-slate-800 hover:bg-rose-500 dark:hover:bg-rose-600 hover:text-white text-slate-800 dark:text-white font-black text-3xl border-2 border-slate-200 dark:border-slate-700 hover:border-rose-500 shadow-sm transition-all active:scale-95";
}

function checkAnswer(isUserGuessBaku, btn) {
    if(isChecking) return; isChecking = true;
    const btns = document.getElementById('answer-options').querySelectorAll('button');
    const correctBtnIndex = currentQuestion.isBaku ? 0 : 1;
    
    if(isUserGuessBaku === currentQuestion.isBaku) {
        correctCount++; document.getElementById('score-correct').innerText = correctCount;
        btn.classList.remove('bg-white', 'dark:bg-slate-800', 'text-slate-800', 'dark:text-white', 'border-slate-200', 'dark:border-slate-700');
        btn.classList.add('bg-green-500', 'text-white', 'border-green-600');
    } else {
        wrongCount++; document.getElementById('score-wrong').innerText = wrongCount;
        btn.classList.remove('bg-white', 'dark:bg-slate-800', 'text-slate-800', 'dark:text-white', 'border-slate-200', 'dark:border-slate-700');
        btn.classList.add('bg-red-500', 'text-white', 'border-red-600');
        btns[correctBtnIndex].classList.remove('bg-white', 'dark:bg-slate-800', 'text-slate-800', 'dark:text-white', 'border-slate-200', 'dark:border-slate-700');
        btns[correctBtnIndex].classList.add('bg-green-500', 'text-white', 'border-green-600');
    }
    document.getElementById('correct-word-display').innerText = currentQuestion.bakuForm;
    document.getElementById('explanation-text').innerText = currentQuestion.meaning;
    document.getElementById('explanation-box').classList.remove('hidden');
}

function endGame() {
    document.getElementById('panel-gameplay').classList.add('hidden'); document.getElementById('panel-result').classList.remove('hidden'); document.getElementById('panel-result').classList.add('flex');
    document.getElementById('final-correct').innerText = correctCount; document.getElementById('final-wrong').innerText = wrongCount;
    if(mode === 'practice') document.getElementById('result-title').innerText = "Latihan Selesai!"; else document.getElementById('result-title').innerText = "Waktu Habis!";
}

window.addEventListener('DOMContentLoaded', () => {
    if(mode === 'practice') { document.getElementById('timer-container').classList.add('hidden'); document.getElementById('btn-end-session').classList.remove('hidden'); }
    loadBakuData();
    if(mode === 'timer') { timerId = setInterval(() => { timeLeft--; updateTimerDisplay(); if(timeLeft <= 0) { clearInterval(timerId); endGame(); } }, 1000); }
});
</script>
</body>
</html>
