<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Vocabulary - PintarHub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
    tailwind.config = { darkMode: 'class' };
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark');
    }
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root {
    --bg-base: #f8fafc;
    --grad-1: hsla(228,100%,94%,0.5);
    --grad-2: hsla(210,100%,96%,0.5);
    --modal-bg: rgba(255, 255, 255, 0.85);
    --modal-border: rgba(255, 255, 255, 1);
}
.dark {
    --bg-base: #020617;
    --grad-1: hsla(228,100%,15%,0.5);
    --grad-2: hsla(210,100%,15%,0.5);
    --modal-bg: rgba(2, 6, 23, 0.85);
    --modal-border: rgba(255, 255, 255, 0.15);
}
body { font-family: 'Inter', sans-serif; background-color: var(--bg-base); background-image: radial-gradient(at 0% 0%, var(--grad-1) 0, transparent 50%), radial-gradient(at 100% 100%, var(--grad-2) 0, transparent 50%); background-attachment: fixed; }
.modal-glass { background: var(--modal-bg); backdrop-filter: blur(30px); border: 1px solid var(--modal-border); box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.5); }
@keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
.animate-pop-in { animation: popIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
::-webkit-scrollbar { width: 0px; }
</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 text-slate-800 dark:text-slate-100 transition-colors duration-300">

<div id="panel-gameplay" class="modal-glass rounded-[3rem] p-8 w-full max-w-2xl flex flex-col gap-6 animate-pop-in relative overflow-hidden">
    <div class="flex justify-between items-center bg-white/70 dark:bg-slate-800/70 px-6 py-4 rounded-3xl border border-white dark:border-slate-700 shadow-sm transition-colors">
        <div class="flex gap-4">
            <div class="text-green-600 dark:text-green-400 font-bold text-lg">Benar: <span id="score-correct" class="text-2xl font-black ml-1">0</span></div>
            <div class="text-rose-600 dark:text-rose-400 font-bold text-lg">Salah: <span id="score-wrong" class="text-2xl font-black ml-1">0</span></div>
        </div>
        <div class="flex items-center gap-3">
            <div id="timer-container" class="flex items-center gap-2">
                <svg class="w-7 h-7 text-indigo-500 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span id="game-timer" class="text-indigo-600 dark:text-indigo-400 font-black text-3xl tracking-widest">01:00</span>
            </div>
            <button id="btn-end-session" onclick="endGame()" class="hidden bg-slate-900 dark:bg-slate-700 text-white px-6 py-3 rounded-2xl font-bold text-sm hover:bg-slate-800 dark:hover:bg-slate-600 transition-colors shadow-lg active:scale-95">Akhiri Sesi</button>
        </div>
    </div>
    
    <div class="py-8 text-center px-4">
        <h1 id="vocab-question" class="text-4xl sm:text-5xl font-black text-slate-800 dark:text-white tracking-tight drop-shadow-sm mb-4 leading-tight transition-colors">Memuat...</h1>
        <p id="vocab-translation" class="text-lg sm:text-xl text-slate-500 dark:text-slate-400 font-medium italic transition-colors">Memuat terjemahan...</p>
    </div>

    <div id="answer-mcq" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <button onclick="checkAnswer(0, this)" class="py-5 px-6 rounded-3xl bg-white dark:bg-slate-800 hover:bg-indigo-600 dark:hover:bg-indigo-600 hover:text-white text-slate-800 dark:text-white font-bold text-xl border-2 border-slate-200 dark:border-slate-700 hover:border-indigo-600 shadow-sm transition-all active:scale-95 text-left flex justify-between items-center group"></button>
        <button onclick="checkAnswer(1, this)" class="py-5 px-6 rounded-3xl bg-white dark:bg-slate-800 hover:bg-indigo-600 dark:hover:bg-indigo-600 hover:text-white text-slate-800 dark:text-white font-bold text-xl border-2 border-slate-200 dark:border-slate-700 hover:border-indigo-600 shadow-sm transition-all active:scale-95 text-left flex justify-between items-center group"></button>
        <button onclick="checkAnswer(2, this)" class="py-5 px-6 rounded-3xl bg-white dark:bg-slate-800 hover:bg-indigo-600 dark:hover:bg-indigo-600 hover:text-white text-slate-800 dark:text-white font-bold text-xl border-2 border-slate-200 dark:border-slate-700 hover:border-indigo-600 shadow-sm transition-all active:scale-95 text-left flex justify-between items-center group"></button>
        <button onclick="checkAnswer(3, this)" class="py-5 px-6 rounded-3xl bg-white dark:bg-slate-800 hover:bg-indigo-600 dark:hover:bg-indigo-600 hover:text-white text-slate-800 dark:text-white font-bold text-xl border-2 border-slate-200 dark:border-slate-700 hover:border-indigo-600 shadow-sm transition-all active:scale-95 text-left flex justify-between items-center group"></button>
    </div>

    <div id="explanation-box" class="hidden mt-4 p-6 bg-indigo-50 dark:bg-slate-800/80 border-2 border-indigo-100 dark:border-slate-700 rounded-3xl animate-pop-in transition-colors">
        <h3 class="font-bold text-indigo-800 dark:text-indigo-300 mb-3 text-lg">Arti Kosakata:</h3>
        <ul id="explanation-list" class="space-y-2 text-indigo-700 dark:text-indigo-200 font-medium"></ul>
        <button onclick="generateQuestion()" class="mt-6 w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">Lanjut ke Pertanyaan Berikutnya</button>
    </div>
</div>

<div id="panel-result" class="modal-glass rounded-[3rem] p-12 w-full max-w-md hidden flex-col items-center gap-8 text-center animate-pop-in">
    <div class="w-28 h-28 bg-gradient-to-br from-indigo-500 to-blue-600 rounded-full flex items-center justify-center shadow-2xl shadow-blue-500/40 text-white mb-2">
        <svg class="w-14 h-14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
    </div>
    <div>
        <h2 id="result-title" class="text-4xl font-black text-slate-800 dark:text-white mb-2 tracking-tight">Sesi Selesai!</h2>
        <p class="text-slate-500 dark:text-slate-400 font-bold text-lg">Berikut adalah hasil belajarmu:</p>
    </div>
    <div class="flex gap-10">
        <div>
            <div class="text-5xl font-black text-green-500" id="final-correct">0</div>
            <div class="text-sm text-slate-400 font-bold uppercase tracking-widest mt-2">Benar</div>
        </div>
        <div>
            <div class="text-5xl font-black text-rose-500" id="final-wrong">0</div>
            <div class="text-sm text-slate-400 font-bold uppercase tracking-widest mt-2">Salah</div>
        </div>
    </div>
    <button onclick="window.location.href='/index.html'" class="w-full mt-4 py-5 rounded-3xl bg-slate-900 dark:bg-slate-700 hover:bg-slate-800 dark:hover:bg-slate-600 text-white font-bold text-xl shadow-xl transition-all hover:-translate-y-1">Kembali ke Dashboard</button>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const mode = urlParams.get('mode') || 'timer';
let vocabData = []; let currentQuestion = null; let correctCount = 0; let wrongCount = 0; let timeLeft = 60; let timerId = null; let isChecking = false;

async function loadVocabData() {
    try {
        const response = await fetch('/database/vocab.json');
        if (!response.ok) throw new Error('Gagal memuat bank soal');
        vocabData = await response.json();
        vocabData = vocabData.sort(() => Math.random() - 0.5);
        generateQuestion();
    } catch (error) {
        document.getElementById('vocab-question').innerText = "Oops! Gagal memuat data.";
        document.getElementById('vocab-translation').innerText = "Pastikan path ke vocab.json sudah benar.";
    }
}

function updateTimerDisplay() { let m = Math.floor(timeLeft / 60).toString().padStart(2, '0'); let s = (timeLeft % 60).toString().padStart(2, '0'); document.getElementById('game-timer').innerText = `${m}:${s}`; }

function generateQuestion() {
    if (vocabData.length === 0) return;
    isChecking = false; document.getElementById('explanation-box').classList.add('hidden');
    const randomIndex = Math.floor(Math.random() * vocabData.length); currentQuestion = vocabData[randomIndex];
    document.getElementById('vocab-question').innerText = currentQuestion.q; document.getElementById('vocab-translation').innerText = currentQuestion.t;
    const btns = document.getElementById('answer-mcq').querySelectorAll('button');
    btns.forEach((btn, idx) => {
        btn.innerHTML = `<span>${currentQuestion.options[idx]}</span>`;
        btn.className = "py-5 px-6 rounded-3xl bg-white dark:bg-slate-800 hover:bg-indigo-600 hover:text-white text-slate-800 dark:text-white font-bold text-xl border-2 border-slate-200 dark:border-slate-700 hover:border-indigo-600 shadow-sm transition-all active:scale-95 text-left flex justify-between items-center group";
    });
}

function checkAnswer(selectedIndex, btn) {
    if(isChecking) return; isChecking = true;
    const btns = document.getElementById('answer-mcq').querySelectorAll('button');
    if(selectedIndex === currentQuestion.correct) {
        correctCount++; document.getElementById('score-correct').innerText = correctCount;
        btn.classList.remove('bg-white', 'dark:bg-slate-800', 'hover:bg-indigo-600', 'text-slate-800', 'dark:text-white', 'border-slate-200', 'dark:border-slate-700');
        btn.classList.add('bg-green-500', 'text-white', 'border-green-600');
        btn.innerHTML += `<svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
    } else {
        wrongCount++; document.getElementById('score-wrong').innerText = wrongCount;
        btn.classList.remove('bg-white', 'dark:bg-slate-800', 'hover:bg-indigo-600', 'text-slate-800', 'dark:text-white', 'border-slate-200', 'dark:border-slate-700');
        btn.classList.add('bg-red-500', 'text-white', 'border-red-600');
        btn.innerHTML += `<svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
        const correctBtn = btns[currentQuestion.correct];
        correctBtn.classList.remove('bg-white', 'dark:bg-slate-800', 'hover:bg-indigo-600', 'text-slate-800', 'dark:text-white', 'border-slate-200', 'dark:border-slate-700');
        correctBtn.classList.add('bg-green-500', 'text-white', 'border-green-600');
    }
    const expList = document.getElementById('explanation-list'); expList.innerHTML = '';
    currentQuestion.meanings.forEach(meaning => { let parts = meaning.split(':'); expList.innerHTML += `<li><span class="font-extrabold text-indigo-900 dark:text-indigo-300">${parts[0]}</span>: ${parts[1]}</li>`; });
    document.getElementById('explanation-box').classList.remove('hidden');
}

function endGame() {
    document.getElementById('panel-gameplay').classList.add('hidden'); document.getElementById('panel-result').classList.remove('hidden'); document.getElementById('panel-result').classList.add('flex');
    document.getElementById('final-correct').innerText = correctCount; document.getElementById('final-wrong').innerText = wrongCount;
    if(mode === 'practice') document.getElementById('result-title').innerText = "Latihan Selesai!"; else document.getElementById('result-title').innerText = "Waktu Habis!";
}

window.addEventListener('DOMContentLoaded', () => {
    if(mode === 'practice') { document.getElementById('timer-container').classList.add('hidden'); document.getElementById('btn-end-session').classList.remove('hidden'); }
    loadVocabData();
    if(mode === 'timer') { timerId = setInterval(() => { timeLeft--; updateTimerDisplay(); if(timeLeft <= 0) { clearInterval(timerId); endGame(); } }, 1000); }
});
</script>
</body>
</html>
